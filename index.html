<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Minha TV Programada</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="tv">
    <div class="tela">
      <div id="youtubePlayer"></div>
      <video id="videoLocal" controls autoplay muted></video>
      <img id="imagemLocal" alt="Mídia local">
    </div>    
  </div>
  <div id="loadingBox">
  <div id="loadingTexto">Carregando vídeo...</div>
  <div id="barraLoading">
    <div id="progressoLoading"></div>
  </div>
</div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>

</html>
