<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Minha TV Programada</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>

<body>
  <div class="tv">
  <div class="tela">

    <div id="youtubeContainer">
      <div id="youtubePlayer"></div>
    </div>

    <video id="videoLocal"></video>

    <img id="imagemLocal" alt="Mídia local">

    <div class="info">
      <p id="status">Carregando programação...</p>
      <p id="proximo"></p>
    </div>

    <div id="loadingBox">
      <div id="loadingTexto">Carregando...</div>

      <div id="barraLoading">
        <div id="progressoLoading"></div>
      </div>
    </div>

  </div>
</div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>

</html>
