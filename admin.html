<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Administrativo - TV Local</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="container">
    <h1>Painel Administrativo</h1>
    <p>Configure a programação normal e os anúncios da sua TV local.</p>

    <section class="bloco">
      <h2>Programação normal</h2>

      <form id="formPrograma">
        <label>Nome do programa</label>
        <input type="text" id="programaNome" required>

        <label>Início</label>
        <input type="time" id="programaInicio" required>

        <label>Fim</label>
        <input type="time" id="programaFim" required>

        <label>Tipo de vídeo</label>
        <select id="programaTipo">
          <option value="youtube">YouTube</option>
          <option value="arquivo">Arquivo do PC</option>
        </select>

        <div id="programaCampoYoutube">
          <label>Link ou ID do YouTube</label>
          <input type="text" id="programaYoutube">
        </div>

        <div id="programaCampoArquivo" style="display:none;">
          <label>Arquivo do PC</label>
          <input type="file" id="programaArquivo" accept="video/*,image/*">
        </div>

        <button type="submit">Salvar programa</button>
      </form>

      <div id="listaProgramas"></div>
    </section>

    <section class="bloco">
      <h2>Programação dos anúncios</h2>

      <form id="formAnuncio">
        <label>Nome do anúncio</label>
        <input type="text" id="anuncioNome" required>

        <label>Horário de exibição</label>
        <input type="time" id="anuncioHorario" required>

        <label>Duração em segundos</label>
        <input type="number" id="anuncioDuracao" required>

        <label>Tipo de anúncio</label>
        <select id="anuncioTipo">
          <option value="youtube">YouTube</option>
          <option value="arquivo">Arquivo do PC</option>
        </select>

        <div id="anuncioCampoYoutube">
          <label>Link ou ID do YouTube</label>
          <input type="text" id="anuncioYoutube">
        </div>

        <div id="anuncioCampoArquivo" style="display:none;">
          <label>Arquivo do PC</label>
          <input type="file" id="anuncioArquivo" accept="video/*,image/*">
        </div>

        <button type="submit">Salvar anúncio</button>
      </form>

      <div id="listaAnuncios"></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
